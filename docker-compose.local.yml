version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: app_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nextjs
      - laravel

  nextjs:
    build: ./NextUI
    container_name: app_next
    restart: unless-stopped
    environment:
      - LARAVEL_INTERNAL_URL=http://laravel:9000
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_SITE_URL=http://localhost

  laravel:
    build: ./LaraBackend
    container_name: app_api
    restart: unless-stopped
    volumes:
      - ./LaraBackend:/var/www
    depends_on:
      - mysql
      - redis
    env_file:
      - LaraBackend/.env

  mysql:
    image: mysql:8
    container_name: app_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: app_redis
    restart: unless-stopped

volumes:
  mysql_data:
