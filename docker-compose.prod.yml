version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: app_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
      - ./LaraBackend/public:/var/www/public
      - ./LaraBackend/storage:/var/www/storage
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - nextjs
      - laravel

  nextjs:
    build: ./NextUI
    container_name: app_next
    restart: unless-stopped
    environment:
      - LARAVEL_INTERNAL_URL=http://laravel:9000
      - NEXT_PUBLIC_API_URL=https://api.example.com/api
      - NEXT_PUBLIC_SITE_URL=https://app.example.com

  laravel:
    build: ./LaraBackend
    container_name: app_api
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    env_file:
      - LaraBackend/.env
    volumes:
      - ./LaraBackend:/var/www

  mysql:
    image: mysql:8
    container_name: app_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: app_redis
    restart: unless-stopped

volumes:
  mysql_data:
